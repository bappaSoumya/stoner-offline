<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stoner Offline - Healthy Edition</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Splash Screen -->
    <div id="splash-screen">
        <div class="splash-content">
            <h1>🎯 STONER OFFLINE</h1>
            <h2>Healthy Edition</h2>
            <div class="splash-buttons">
                <button id="new-game-btn" class="splash-btn">🎮 New Game</button>
                <button id="settings-btn" class="splash-btn">⚙️ Settings</button>
                <button id="stats-btn" class="splash-btn">📊 Statistics</button>
            </div>
        </div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="1000" height="600"></canvas>
        <button id="reset-btn">New Match</button>
        <div id="turn-msg">READY?</div>
        <div id="map-name"></div>

        <!-- Stone Selector -->
        <div id="stone-selector"></div>

        <!-- Game Mode Selector -->
        <div id="mode-selector">
            <label for="gameMode">Game Mode:</label>
            <select id="gameMode">
                <option value="single">Single Player vs AI</option>
                <option value="multi" selected>Multiplayer (2 Players)</option>
            </select>
        </div>

        <!-- Multiplayer Controls -->
        <div id="multiplayer-controls">
            <div class="player-controls">
                <strong>Player 1 (Left)</strong>
                <p>Click and drag to aim, release to shoot</p>
            </div>
            <div class="player-controls">
                <strong>Player 2 (Right)</strong>
                <p>Click and drag to aim, release to shoot</p>
            </div>
        </div>

        <!-- Shop Overlay -->
        <div id="shop-overlay">
            <div id="shop-panel">
                <h3>
                    <span>⚡ SHOP — <span id="shop-player">P1</span></span>
                    <span>(<span id="shop-pts">0</span> pts)</span>
                </h3>
                <div id="shop-items"></div>
                <button id="shop-close-btn">Close</button>
            </div>
        </div>
    </div>

    <div id="ui">
        <div class="stats" id="ui-p1">
            <strong>PLAYER 1</strong>
            <div class="bar-label"><strong style="margin-right: 50%;">HP</strong><span id="hp1-txt">100</span></div>
            <div class="bar-bg">
                <div id="hp1" class="hp-bar-fill"></div>
            </div>
            <div class="bar-label"><strong style="margin-right: 50%;">PTS</strong><span id="pts1-txt">0</span></div>
            <div class="bar-bg">
                <div id="pts1" class="pts-bar-fill"></div>
            </div>
        </div>
        <!-- Shop Button -->
        <button id="shop-trigger">🛒 SHOP</button>

        <div class="stats" id="ui-p2">
            <strong>PLAYER 2</strong>
            <div class="bar-label"><strong style="margin-right: 50%;">HP</strong><span id="hp2-txt">100</span></div>
            <div class="bar-bg">
                <div id="hp2" class="hp-bar-fill"></div>
            </div>
            <div class="bar-label"><strong style="margin-right: 50%;">PTS</strong><span id="pts2-txt">0</span></div>
            <div class="bar-bg">
                <div id="pts2" class="pts-bar-fill"></div>
            </div>
        </div>
    </div>

<script src="constants.js"></script>
<script src="maps.js"></script>
<script src="particle.js"></script>
<script src="player.js"></script>
<script src="projectile.js"></script>
<script src="ui.js"></script>
<script src="ai.js"></script>
<script src="game.js"></script>

<script>
// Background music setup
const backgroundMusic = new Audio();
backgroundMusic.src = 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3'; // Copyright-free music
backgroundMusic.loop = true;
backgroundMusic.volume = 0.3; // Lower volume for background music

// Splash screen functionality
document.addEventListener('DOMContentLoaded', function() {
    const splashScreen = document.getElementById('splash-screen');
    const newGameBtn = document.getElementById('new-game-btn');
    const settingsBtn = document.getElementById('settings-btn');
    const statsBtn = document.getElementById('stats-btn');
    
    // New Game button - start the game
    newGameBtn.addEventListener('click', function() {
        splashScreen.style.display = 'none';
        // Start background music when game starts
        backgroundMusic.play().catch(e => console.log('Music autoplay prevented:', e));
    });
    
    // Settings button - non-functional for now
    settingsBtn.addEventListener('click', function() {
        alert('Settings coming soon!');
    });
    
    // Statistics button - non-functional for now
    statsBtn.addEventListener('click', function() {
        alert('Statistics coming soon!');
    });
    
    // Accordion functionality for multiplayer controls
    const multiplayerControls = document.getElementById('multiplayer-controls');
    if (multiplayerControls) {
        // Add click event to toggle accordion
        multiplayerControls.addEventListener('click', function() {
            multiplayerControls.classList.toggle('collapsed');
        });
        
        // Auto-collapse when switching to single player mode
        const gameModeSelect = document.getElementById('gameMode');
        if (gameModeSelect) {
            gameModeSelect.addEventListener('change', function() {
                if (this.value === 'single') {
                    multiplayerControls.classList.add('collapsed');
                } else {
                    multiplayerControls.classList.remove('collapsed');
                }
            });
        }
    }
});
</script>

</body>

</html>

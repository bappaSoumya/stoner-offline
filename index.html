<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stoner Offline - Healthy Edition</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            background-color: #111;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; height: 100vh;
            touch-action: none;
        }
        #game-container { 
            position: relative; 
            width: 100vw; max-width: 1000px;
            aspect-ratio: 1000 / 600;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            background: #000;
        }
        canvas { width: 100%; height: 100%; display: block; }
        #ui {
            position: absolute; top: 8px; width: 100%;
            display: flex; justify-content: space-between; pointer-events: none;
            padding: 0 10px;
        }
        .stats {
            background: rgba(255, 255, 255, 0.92);
            padding: 5px 10px; border-radius: 8px;
            text-align: center; min-width: 120px; border: 2px solid #555;
            font-size: 11px;
            pointer-events: auto;
        }
        .active-ui { border-color: #ffeb3b; box-shadow: 0 0 15px #ffeb3b; transform: scale(1.05); }
        .bar-bg { width: 100%; height: 7px; background: #ddd; border-radius: 4px; overflow: hidden; margin: 2px 0; }
        .hp-bar-fill { height: 100%; background: linear-gradient(90deg, #ff4444, #ff6666); width: 100%; transition: width 0.3s; }
        .pts-bar-fill { height: 100%; background: linear-gradient(90deg, #ffc107, #ffe082); width: 0%; transition: width 0.3s; }
        .bar-label { font-size: 9px; text-align: left; color: #555; font-weight: bold; display: flex; justify-content: space-between; }
        
        #turn-msg {
            position: absolute; top: 75px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: white; padding: 4px 14px;
            border-radius: 20px; font-weight: bold; font-size: 12px;
            white-space: nowrap;
        }
        #map-name {
            position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.5); color: #ccc; padding: 2px 12px;
            border-radius: 10px; font-size: 10px;
        }

        /* Shop Panel */
        #shop-overlay {
            display: none;
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.65);
            z-index: 10;
            justify-content: center; align-items: center;
        }
        #shop-overlay.open { display: flex; }
        #shop-panel {
            background: rgba(255,255,255,0.96);
            border-radius: 14px;
            padding: 14px 18px;
            min-width: 320px; max-width: 90%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        #shop-panel h3 { margin: 0 0 6px; font-size: 16px; text-align: center; }
        .shop-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 5px 0; border-bottom: 1px solid #eee;
            font-size: 13px;
        }
        .shop-row:last-child { border-bottom: none; }
        .shop-row .stone-icon { width: 22px; height: 22px; border-radius: 50%; display: inline-block; margin-right: 6px; vertical-align: middle; }
        .shop-btn {
            padding: 3px 12px; border: none; border-radius: 6px;
            font-weight: bold; font-size: 12px; cursor: pointer;
            color: #fff; transition: 0.2s;
        }
        .shop-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .shop-btn:hover:not(:disabled) { filter: brightness(1.15); }
        #shop-close-btn {
            display: block; margin: 8px auto 0; padding: 5px 22px;
            background: #666; color: #fff; border: none; border-radius: 8px;
            font-weight: bold; cursor: pointer; font-size: 13px;
        }
        #shop-trigger {
            position: absolute; bottom: 8px; right: 10px;
            background: rgba(255,215,0,0.9); color: #333; border: none;
            padding: 4px 12px; border-radius: 8px; font-weight: bold;
            cursor: pointer; font-size: 12px; z-index: 5;
            pointer-events: auto;
        }
        #shop-trigger:hover { background: #ffd740; }

        /* Stone selector */
        #stone-selector {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 6px; z-index: 5;
        }
        .stone-sel-btn {
            width: 32px; height: 32px; border-radius: 50%; border: 3px solid transparent;
            cursor: pointer; position: relative; transition: 0.2s;
        }
        .stone-sel-btn.active { border-color: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.7); transform: scale(1.15); }
        .stone-sel-btn .stone-count {
            position: absolute; top: -6px; right: -6px;
            background: #333; color: #fff; font-size: 8px; font-weight: bold;
            border-radius: 50%; width: 14px; height: 14px;
            display: flex; align-items: center; justify-content: center;
        }

        #reset-btn {
            margin-top: 12px; 
            padding: 10px 30px; 
            font-weight: bold; font-size: 15px;
            background: #4CAF50;
            color: white; border: none; border-radius: 50px; 
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        @media (min-width: 600px) {
            .stats { min-width: 180px; font-size: 14px; }
            #turn-msg { top: 85px; font-size: 16px; }
            .bar-label { font-size: 10px; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="1000" height="600"></canvas>
    <div id="ui">
        <div class="stats" id="ui-p1">
            <strong>PLAYER 1</strong>
            <div class="bar-label"><span>HP</span><span id="hp1-txt">100</span></div>
            <div class="bar-bg"><div id="hp1" class="hp-bar-fill"></div></div>
            <div class="bar-label"><span>PTS</span><span id="pts1-txt">0</span></div>
            <div class="bar-bg"><div id="pts1" class="pts-bar-fill"></div></div>
        </div>
        <div class="stats" id="ui-p2">
            <strong>PLAYER 2</strong>
            <div class="bar-label"><span>HP</span><span id="hp2-txt">100</span></div>
            <div class="bar-bg"><div id="hp2" class="hp-bar-fill"></div></div>
            <div class="bar-label"><span>PTS</span><span id="pts2-txt">0</span></div>
            <div class="bar-bg"><div id="pts2" class="pts-bar-fill"></div></div>
        </div>
    </div>
    <div id="turn-msg">READY?</div>
    <div id="map-name"></div>

    <!-- Stone Selector -->
    <div id="stone-selector"></div>

    <!-- Shop Button -->
    <button id="shop-trigger">🛒 SHOP</button>

    <!-- Shop Overlay -->
    <div id="shop-overlay">
        <div id="shop-panel">
            <h3>⚡ SHOP — <span id="shop-player">P1</span> (<span id="shop-pts">0</span> pts)</h3>
            <div id="shop-items"></div>
            <button id="shop-close-btn">Close</button>
        </div>
    </div>
</div>

<button id="reset-btn">New Match</button>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ─── CONSTANTS ───
const GRAVITY = 0.22;
const POWER_MULT = 0.15;
const MAX_HP = 100;
const MAX_PTS = 200; // Points bar max display

// ─── STONE TYPES ───
const STONE_TYPES = {
    rock:     { name: 'Rock',       color: '#555',    glow: null,         dmg: 15, radius: 8,  cost: 0,  trail: '#888',    desc: 'Basic stone' },
    ice:      { name: 'Ice Stone',  color: '#00bcd4', glow: '#80deea',    dmg: 20, radius: 9,  cost: 25, trail: '#b2ebf2',  desc: '20 dmg, slows' },
    fire:     { name: 'Fire Stone', color: '#ff5722', glow: '#ff8a65',    dmg: 30, radius: 10, cost: 40, trail: '#ffab91',  desc: '30 dmg, burns' },
    thunder:  { name: 'Thunder',    color: '#ffc107', glow: '#fff176',    dmg: 25, radius: 9,  cost: 35, trail: '#fff9c4',  desc: '25 dmg, shock' },
    multi:    { name: 'Multi Stone',color: '#9c27b0', glow: '#ce93d8',    dmg: 12, radius: 7,  cost: 50, trail: '#e1bee7',  desc: 'Splits into 3!' },
};

// ─── SHOP ITEMS ───
const SHOP_ITEMS = [
    { id: 'heal',    label: '❤️ Heal +25 HP',       cost: 30, type: 'heal',  amount: 25 },
    { id: 'ice',     label: '🧊 Ice Stone',          cost: 25, type: 'stone', stone: 'ice' },
    { id: 'fire',    label: '🔥 Fire Stone',         cost: 40, type: 'stone', stone: 'fire' },
    { id: 'thunder', label: '⚡ Thunder Stone',      cost: 35, type: 'stone', stone: 'thunder' },
    { id: 'multi',   label: '💎 Multi Stone (x3)',   cost: 50, type: 'stone', stone: 'multi' },
];

// ─── RANDOM MAPS ───
const MAP_TEMPLATES = [
    {
        name: 'Flat Meadow',
        getGround: () => ({ type: 'flat' }),
        p1y: 0, p2y: 0
    },
    {
        name: 'P1 Hilltop',
        getGround: () => ({ type: 'hill', hillSide: 'left' }),
        p1y: -100, p2y: 0
    },
    {
        name: 'P2 Hilltop',
        getGround: () => ({ type: 'hill', hillSide: 'right' }),
        p1y: 0, p2y: -100
    },
    {
        name: 'P1 Riverbank',
        getGround: () => ({ type: 'river', riverSide: 'left' }),
        p1y: 0, p2y: 0
    },
    {
        name: 'P2 Riverbank',
        getGround: () => ({ type: 'river', riverSide: 'right' }),
        p1y: 0, p2y: 0
    },
    {
        name: 'Valley',
        getGround: () => ({ type: 'valley' }),
        p1y: -70, p2y: -70
    },
];

// ─── GLOBALS ───
let gameActive = true;
let currentPlayer = 1;
let isDragging = false;
let mousePos = { x: 0, y: 0 };
let birds = [], trees = [];
let particles = [];
let activeProjectile = null;
let subProjectiles = [];

const isNight = Math.random() > 0.5;
const skyColor = isNight ? '#1a237e' : '#87CEEB';
const skyBottom = isNight ? '#000051' : '#E0F6FF';

// Pick random map
const currentMap = MAP_TEMPLATES[Math.floor(Math.random() * MAP_TEMPLATES.length)];
const mapGround = currentMap.getGround();

const BASE_GROUND = 520;

function getGroundY(x) {
    if (mapGround.type === 'flat') return BASE_GROUND;
    if (mapGround.type === 'hill') {
        if (mapGround.hillSide === 'left') {
            if (x < 300) return BASE_GROUND - 100 + (x / 300) * 100;
            return BASE_GROUND;
        } else {
            if (x > 700) return BASE_GROUND - 100 + ((1000 - x) / 300) * 100;
            return BASE_GROUND;
        }
    }
    if (mapGround.type === 'valley') {
        let center = 500;
        let dist = Math.abs(x - center);
        return BASE_GROUND - Math.max(0, (dist - 150) / 350 * 100);
    }
    if (mapGround.type === 'river') {
        // river is a dip
        let riverCenter = mapGround.riverSide === 'left' ? 350 : 650;
        let dist = Math.abs(x - riverCenter);
        if (dist < 80) return BASE_GROUND + 20;
        return BASE_GROUND;
    }
    return BASE_GROUND;
}

function drawGround() {
    // Draw terrain
    ctx.beginPath();
    ctx.moveTo(0, 600);
    for (let x = 0; x <= 1000; x += 2) {
        ctx.lineTo(x, getGroundY(x));
    }
    ctx.lineTo(1000, 600);
    ctx.closePath();
    ctx.fillStyle = isNight ? '#1b5e20' : '#2e7d32';
    ctx.fill();

    // River water
    if (mapGround.type === 'river') {
        let riverCenter = mapGround.riverSide === 'left' ? 350 : 650;
        ctx.fillStyle = 'rgba(33,150,243,0.6)';
        ctx.beginPath();
        for (let x = riverCenter - 80; x <= riverCenter + 80; x += 2) {
            let gy = getGroundY(x);
            ctx.lineTo(x, gy);
        }
        ctx.lineTo(riverCenter + 80, 600);
        ctx.lineTo(riverCenter - 80, 600);
        ctx.closePath();
        ctx.fill();
        // Water shimmer
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 1;
        for (let i = 0; i < 5; i++) {
            let wx = riverCenter - 60 + Math.sin(Date.now()/800 + i) * 40;
            let wy = BASE_GROUND + 10 + i * 3;
            ctx.beginPath();
            ctx.moveTo(wx - 10, wy);
            ctx.lineTo(wx + 10, wy);
            ctx.stroke();
        }
    }

    // Dirt line
    ctx.strokeStyle = isNight ? '#33691e' : '#1b5e20';
    ctx.lineWidth = 3;
    ctx.beginPath();
    for (let x = 0; x <= 1000; x += 2) {
        if (x === 0) ctx.moveTo(x, getGroundY(x));
        else ctx.lineTo(x, getGroundY(x));
    }
    ctx.stroke();
}

function initEnvironment() {
    for (let i = 0; i < 5; i++) {
        let tx = 50 + Math.random() * 900;
        trees.push({ x: tx, groundY: getGroundY(tx), size: 30 + Math.random() * 40, color: isNight ? '#1b5e20' : '#388e3c' });
    }
    for (let i = 0; i < 3; i++) {
        birds.push({ x: Math.random() * 1000, y: 40 + Math.random() * 120, s: 0.5 + Math.random(), wing: 0 });
    }
}

function drawSky() {
    let grad = ctx.createLinearGradient(0, 0, 0, BASE_GROUND);
    grad.addColorStop(0, skyColor);
    grad.addColorStop(1, skyBottom);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Sun/Moon
    ctx.fillStyle = isNight ? '#f5f5f5' : '#fff59d';
    ctx.beginPath(); ctx.arc(800, 80, 40, 0, Math.PI * 2); ctx.fill();
    if (isNight) { ctx.fillStyle = skyColor; ctx.beginPath(); ctx.arc(775, 75, 40, 0, Math.PI * 2); ctx.fill(); }

    // Stars at night
    if (isNight) {
        ctx.fillStyle = '#fff';
        for (let i = 0; i < 40; i++) {
            let sx = (i * 137 + 50) % 1000;
            let sy = (i * 97 + 20) % 200;
            ctx.beginPath(); ctx.arc(sx, sy, 1, 0, Math.PI * 2); ctx.fill();
        }
    }
}

function drawTrees() {
    trees.forEach(t => {
        ctx.fillStyle = '#5d4037'; ctx.fillRect(t.x - 5, t.groundY - t.size, 10, t.size);
        ctx.fillStyle = t.color; ctx.beginPath(); ctx.arc(t.x, t.groundY - t.size, t.size / 1.2, 0, Math.PI * 2); ctx.fill();
    });
}

function drawBirds() {
    ctx.strokeStyle = isNight ? '#666' : '#333'; ctx.lineWidth = 2;
    birds.forEach(b => {
        b.x += b.s; if (b.x > 1100) b.x = -100;
        b.wing += 0.1; let w = Math.sin(b.wing) * 5;
        ctx.beginPath(); ctx.moveTo(b.x - 10, b.y + w); ctx.quadraticCurveTo(b.x, b.y - 5, b.x + 10, b.y + w); ctx.stroke();
    });
}

function drawEnvironment() {
    drawSky();
    drawBirds();
    drawTrees();
    drawGround();
}

// ─── PARTICLES ───
class Particle {
    constructor(x, y, color, vx, vy, life) {
        this.x = x; this.y = y; this.color = color;
        this.vx = vx; this.vy = vy;
        this.life = life; this.maxLife = life;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        this.vy += 0.08;
        this.life--;
    }
    draw() {
        let alpha = this.life / this.maxLife;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
    }
}

function spawnHitParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        particles.push(new Particle(x, y, color, (Math.random() - 0.5) * 5, -Math.random() * 4, 20 + Math.random() * 20));
    }
}

// ─── PLAYER ───
class Player {
    constructor(x, groundY, color, id) {
        this.baseX = x;
        this.groundY = groundY;
        this.x = x;
        this.y = groundY - 35;
        this.color = color;
        this.hp = MAX_HP;
        this.points = 0;
        this.id = id;
        this.shake = 0;
        this.slingshotX = id === 1 ? x + 45 : x - 45;
        this.slingshotY = this.y - 5;
        // Stone inventory: unlimited rock, others start at 0
        this.stones = { rock: Infinity, ice: 0, fire: 0, thunder: 0, multi: 0 };
        this.selectedStone = 'rock';
    }

    draw() {
        ctx.save();
        if (this.shake > 0) { ctx.translate(Math.random() * 6 - 3, 0); this.shake--; }

        // Turn Indicator Arrow
        if (currentPlayer === this.id && gameActive && !activeProjectile) {
            let bounce = Math.sin(Date.now() / 200) * 8;
            ctx.fillStyle = "#ffeb3b";
            ctx.beginPath();
            ctx.moveTo(this.x - 10, this.y - 85 + bounce);
            ctx.lineTo(this.x + 10, this.y - 85 + bounce);
            ctx.lineTo(this.x, this.y - 68 + bounce);
            ctx.fill();
        }

        let skinColor = '#d4a574';
        let outlineColor = isNight ? '#ddd' : '#333';

        // --- HEALTHY ATHLETIC CHARACTER ---

        // Head
        ctx.fillStyle = skinColor;
        ctx.beginPath(); ctx.arc(this.x, this.y - 48, 12, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = outlineColor; ctx.lineWidth = 1.5;
        ctx.stroke();

        // Eyes
        ctx.fillStyle = '#222';
        let eyeDir = this.id === 1 ? 1 : -1;
        ctx.beginPath(); ctx.arc(this.x + 3 * eyeDir, this.y - 50, 2, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(this.x + 8 * eyeDir, this.y - 50, 2, 0, Math.PI * 2); ctx.fill();

        // Small smile
        ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(this.x + 5 * eyeDir, this.y - 45, 4, 0, Math.PI);
        ctx.stroke();

        // Neck
        ctx.fillStyle = skinColor;
        ctx.fillRect(this.x - 3, this.y - 37, 6, 6);

        // Torso — athletic, V-shape, NOT fat
        ctx.fillStyle = this.id === 1 ? '#1565c0' : '#c62828'; // shirt color
        ctx.beginPath();
        ctx.moveTo(this.x - 14, this.y - 31); // left shoulder
        ctx.lineTo(this.x + 14, this.y - 31); // right shoulder
        ctx.lineTo(this.x + 10, this.y + 2);  // right hip (narrower)
        ctx.lineTo(this.x - 10, this.y + 2);  // left hip (narrower)
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = outlineColor; ctx.lineWidth = 1;
        ctx.stroke();

        // Arms (muscular but lean)
        ctx.lineWidth = 6;
        ctx.lineCap = 'round';
        ctx.strokeStyle = skinColor;

        // Left arm
        ctx.beginPath();
        ctx.moveTo(this.x - 14, this.y - 28);
        ctx.lineTo(this.x - 22, this.y - 10);
        ctx.stroke();
        // Right arm
        ctx.beginPath();
        ctx.moveTo(this.x + 14, this.y - 28);
        ctx.lineTo(this.x + 22, this.y - 10);
        ctx.stroke();

        // Hands (small circles)
        ctx.fillStyle = skinColor;
        ctx.beginPath(); ctx.arc(this.x - 22, this.y - 9, 4, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(this.x + 22, this.y - 9, 4, 0, Math.PI * 2); ctx.fill();

        // Legs (athletic)
        ctx.fillStyle = '#37474f'; // pants
        ctx.lineWidth = 7;
        ctx.strokeStyle = '#37474f';
        ctx.beginPath();
        ctx.moveTo(this.x - 6, this.y + 2);
        ctx.lineTo(this.x - 12, this.y + 30);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(this.x + 6, this.y + 2);
        ctx.lineTo(this.x + 12, this.y + 30);
        ctx.stroke();

        // Shoes
        ctx.fillStyle = '#222';
        ctx.beginPath(); ctx.ellipse(this.x - 12, this.y + 32, 7, 4, 0, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(this.x + 12, this.y + 32, 7, 4, 0, 0, Math.PI * 2); ctx.fill();

        // Slingshot
        ctx.strokeStyle = '#5D4037'; ctx.lineWidth = 5;
        let slY = this.groundY;
        ctx.beginPath(); ctx.moveTo(this.slingshotX, slY); ctx.lineTo(this.slingshotX, this.slingshotY); ctx.stroke();
        // Fork
        ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(this.slingshotX - 8, this.slingshotY - 12); ctx.lineTo(this.slingshotX, this.slingshotY); ctx.lineTo(this.slingshotX + 8, this.slingshotY - 12); ctx.stroke();

        ctx.restore();
    }
}

// ─── PROJECTILE ───
class Projectile {
    constructor(x, y, vx, vy, stoneType, ownerId) {
        this.x = x; this.y = y; this.vx = vx; this.vy = vy;
        this.active = true;
        this.stoneType = stoneType;
        this.ownerId = ownerId;
        this.trailTimer = 0;
        this.st = STONE_TYPES[stoneType];
    }
    update() {
        this.vy += GRAVITY;
        this.x += this.vx;
        this.y += this.vy;
        // Trail particles
        this.trailTimer++;
        if (this.trailTimer % 2 === 0) {
            particles.push(new Particle(this.x, this.y, this.st.trail || '#888', (Math.random() - 0.5) * 1.5, (Math.random() - 0.5) * 1.5, 15));
        }
        // Ground hit
        if (this.y > getGroundY(this.x)) {
            this.explode(false);
            return;
        }
        // Player hit
        [p1, p2].forEach(p => {
            if (Math.hypot(this.x - p.x, this.y - (p.y - 15)) < 32) {
                let dmg = this.st.dmg;
                p.hp = Math.max(0, p.hp - dmg);
                p.shake = 20;
                // Award points to attacker
                let attacker = this.ownerId === 1 ? p1 : p2;
                if (p.id !== this.ownerId) {
                    attacker.points += dmg;
                }
                spawnHitParticles(this.x, this.y, this.st.color, 12);
                this.explode(true);
            }
        });
        if (this.x < -20 || this.x > 1020) this.explode(false);
    }
    explode(hit) {
        if (!this.active) return;
        this.active = false;
        // Multi stone splits
        if (this.stoneType === 'multi' && hit === false) {
            // Don't split on player hit, only on ground
            for (let i = -1; i <= 1; i++) {
                let sp = new Projectile(this.x, this.y - 5, this.vx * 0.5 + i * 2, -4, 'rock', this.ownerId);
                sp.st = { ...STONE_TYPES.rock, dmg: STONE_TYPES.multi.dmg };
                subProjectiles.push(sp);
            }
        }
        if (subProjectiles.length === 0) {
            setTimeout(nextTurn, 500);
        }
    }
    draw() {
        if (!this.active) return;
        ctx.save();
        if (this.st.glow) {
            ctx.shadowColor = this.st.glow;
            ctx.shadowBlur = 15;
        }
        ctx.fillStyle = this.st.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.st.radius, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }
}

// ─── INIT PLAYERS ───
let p1GroundY = getGroundY(160);
let p2GroundY = getGroundY(840);
let p1 = new Player(160, p1GroundY, '#1565c0', 1);
let p2 = new Player(840, p2GroundY, '#c62828', 2);

// ─── STONE SELECTOR UI ───
function updateStoneSelector() {
    let container = document.getElementById('stone-selector');
    container.innerHTML = '';
    let cp = currentPlayer === 1 ? p1 : p2;
    if (!gameActive || activeProjectile) { container.style.display = 'none'; return; }
    container.style.display = 'flex';

    Object.keys(STONE_TYPES).forEach(key => {
        let st = STONE_TYPES[key];
        let count = cp.stones[key];
        if (count <= 0 && key !== 'rock') return;
        let btn = document.createElement('div');
        btn.className = 'stone-sel-btn' + (cp.selectedStone === key ? ' active' : '');
        btn.style.background = st.color;
        btn.title = st.name + ' — ' + st.desc;
        if (key !== 'rock') {
            let badge = document.createElement('span');
            badge.className = 'stone-count';
            badge.textContent = count === Infinity ? '∞' : count;
            btn.appendChild(badge);
        }
        btn.onclick = () => { cp.selectedStone = key; updateStoneSelector(); };
        container.appendChild(btn);
    });
}

// ─── SHOP ───
function openShop() {
    if (!gameActive || activeProjectile) return;
    let cp = currentPlayer === 1 ? p1 : p2;
    document.getElementById('shop-player').textContent = 'P' + cp.id;
    document.getElementById('shop-pts').textContent = cp.points;
    let itemsDiv = document.getElementById('shop-items');
    itemsDiv.innerHTML = '';
    SHOP_ITEMS.forEach(item => {
        let row = document.createElement('div');
        row.className = 'shop-row';
        let canBuy = cp.points >= item.cost;
        if (item.type === 'heal' && cp.hp >= MAX_HP) canBuy = false;
        let btnColor = '#4CAF50';
        if (item.type === 'stone') {
            btnColor = STONE_TYPES[item.stone].color;
        }
        row.innerHTML = `
            <span>${item.label}</span>
            <button class="shop-btn" style="background:${btnColor}" ${!canBuy ? 'disabled' : ''} data-id="${item.id}">${item.cost} pts</button>
        `;
        row.querySelector('button').onclick = () => buyItem(item);
        itemsDiv.appendChild(row);
    });
    document.getElementById('shop-overlay').classList.add('open');
}

function buyItem(item) {
    let cp = currentPlayer === 1 ? p1 : p2;
    if (cp.points < item.cost) return;
    if (item.type === 'heal' && cp.hp >= MAX_HP) return;
    cp.points -= item.cost;
    if (item.type === 'heal') {
        cp.hp = Math.min(MAX_HP, cp.hp + item.amount);
    } else if (item.type === 'stone') {
        cp.stones[item.stone] = (cp.stones[item.stone] || 0) + 3;
    }
    openShop(); // refresh
    updateStoneSelector();
}

document.getElementById('shop-trigger').onclick = openShop;
document.getElementById('shop-close-btn').onclick = () => {
    document.getElementById('shop-overlay').classList.remove('open');
};

// ─── GAME LOGIC ───
function nextTurn() {
    activeProjectile = null;
    subProjectiles = [];
    if (p1.hp <= 0 || p2.hp <= 0) { gameActive = false; return; }
    currentPlayer = currentPlayer === 1 ? 2 : 1;
    updateStoneSelector();
}

function getMousePos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: (clientX - rect.left) * (canvas.width / rect.width), y: (clientY - rect.top) * (canvas.height / rect.height) };
}

canvas.addEventListener('mousedown', (e) => { if (gameActive && !activeProjectile) { isDragging = true; mousePos = getMousePos(e); } });
window.addEventListener('mousemove', (e) => { if (isDragging) mousePos = getMousePos(e); });
window.addEventListener('mouseup', handleRelease);

canvas.addEventListener('touchstart', (e) => { if (gameActive && !activeProjectile) { isDragging = true; mousePos = getMousePos(e); e.preventDefault(); } }, { passive: false });
window.addEventListener('touchmove', (e) => { if (isDragging) { mousePos = getMousePos(e); e.preventDefault(); } }, { passive: false });
window.addEventListener('touchend', handleRelease);

function handleRelease() {
    if (!isDragging) return;
    isDragging = false;
    let cp = currentPlayer === 1 ? p1 : p2;
    let stoneKey = cp.selectedStone;
    // Check availability
    if (stoneKey !== 'rock' && cp.stones[stoneKey] <= 0) {
        stoneKey = 'rock'; cp.selectedStone = 'rock';
    }
    // Consume stone
    if (stoneKey !== 'rock') { cp.stones[stoneKey]--; }
    activeProjectile = new Projectile(
        cp.slingshotX, cp.slingshotY,
        (cp.slingshotX - mousePos.x) * POWER_MULT,
        (cp.slingshotY - mousePos.y) * POWER_MULT,
        stoneKey, cp.id
    );
    updateStoneSelector();
}

// ─── UI UPDATE ───
function updateUI() {
    document.getElementById('hp1').style.width = Math.max(0, p1.hp) + '%';
    document.getElementById('hp2').style.width = Math.max(0, p2.hp) + '%';
    document.getElementById('hp1-txt').textContent = Math.max(0, Math.round(p1.hp));
    document.getElementById('hp2-txt').textContent = Math.max(0, Math.round(p2.hp));

    document.getElementById('pts1').style.width = Math.min(100, (p1.points / MAX_PTS) * 100) + '%';
    document.getElementById('pts2').style.width = Math.min(100, (p2.points / MAX_PTS) * 100) + '%';
    document.getElementById('pts1-txt').textContent = p1.points;
    document.getElementById('pts2-txt').textContent = p2.points;

    document.getElementById('ui-p1').className = currentPlayer === 1 ? 'stats active-ui' : 'stats';
    document.getElementById('ui-p2').className = currentPlayer === 2 ? 'stats active-ui' : 'stats';

    let msg = document.getElementById('turn-msg');
    if (!gameActive) {
        msg.innerText = p1.hp <= 0 ? "🏆 PLAYER 2 WINS!" : "🏆 PLAYER 1 WINS!";
        document.getElementById('stone-selector').style.display = 'none';
    } else {
        msg.innerText = activeProjectile ? "💥 FIRE!" : `🎯 PLAYER ${currentPlayer}'S TURN`;
    }

    document.getElementById('map-name').textContent = '🗺️ ' + currentMap.name;
}

// ─── MAIN LOOP ───
function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawEnvironment();
    p1.draw();
    p2.draw();

    // Drag line
    if (isDragging) {
        let activeP = currentPlayer === 1 ? p1 : p2;
        let st = STONE_TYPES[activeP.selectedStone];
        ctx.strokeStyle = st.glow || (isNight ? 'rgba(255,255,255,0.5)' : 'rgba(0,0,0,0.5)');
        ctx.lineWidth = 3;
        ctx.setLineDash([5, 5]);
        ctx.beginPath(); ctx.moveTo(activeP.slingshotX, activeP.slingshotY); ctx.lineTo(mousePos.x, mousePos.y); ctx.stroke();
        ctx.setLineDash([]);

        // Power indicator
        let dx = activeP.slingshotX - mousePos.x;
        let dy = activeP.slingshotY - mousePos.y;
        let power = Math.min(Math.hypot(dx, dy) * POWER_MULT, 25);
        let powerPct = Math.round((power / 25) * 100);
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.font = 'bold 14px sans-serif';
        ctx.fillText('Power: ' + powerPct + '%', mousePos.x + 15, mousePos.y - 10);
    }

    // Active projectile
    if (activeProjectile && activeProjectile.active) {
        activeProjectile.update();
        activeProjectile.draw();
    }

    // Sub projectiles (multi stone)
    for (let i = subProjectiles.length - 1; i >= 0; i--) {
        let sp = subProjectiles[i];
        if (sp.active) { sp.update(); sp.draw(); }
        else { subProjectiles.splice(i, 1); }
    }
    if (activeProjectile && !activeProjectile.active && subProjectiles.length === 0 && !gameActive === false) {
        // handled in explode
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw();
        if (particles[i].life <= 0) particles.splice(i, 1);
    }

    updateUI();
    requestAnimationFrame(loop);
}

// ─── INIT ───
document.getElementById('reset-btn').onclick = () => location.reload();
initEnvironment();
updateStoneSelector();
loop();
</script>
